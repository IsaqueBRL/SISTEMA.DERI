<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAVÃO INVEST | Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="gradient-bg p-5 text-white shadow-2xl sticky top-0 z-40">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase tracking-tighter">PAVÃO INVEST | PRIVATE</h1>
            <button onclick="toggleModal('modalAtivo')" class="bg-blue-600 px-4 py-2 rounded-xl font-bold text-xs uppercase hover:bg-blue-700">+ Novo Ativo</button>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <div class="glass p-6 rounded-[2rem] shadow-xl mb-8 inline-block">
            <p class="text-slate-400 text-[10px] font-black uppercase mb-1">Patrimônio Consolidado</p>
            <h2 id="patrimonio-exibido" class="text-3xl font-black italic italic tracking-tighter">R$ 0,00</h2>
        </div>

        <div class="glass rounded-[2rem] shadow-2xl overflow-hidden">
            <table class="w-full text-left text-sm font-bold uppercase">
                <thead class="bg-slate-100/50 text-slate-400 border-b">
                    <tr>
                        <th class="p-5 text-center">Ver</th>
                        <th class="p-5">Categoria</th>
                        <th class="p-5 text-center">Meta %</th>
                        <th class="p-5 text-center">Atual %</th>
                        <th class="p-5 text-right">Valor</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo" class="divide-y divide-slate-100 bg-white"></tbody>
            </table>
        </div>
    </main>

    <div id="modalDetalhes" class="pointer-events-none">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="toggleModal('modalDetalhes')"></div>
        <div class="glass w-full max-w-lg p-8 rounded-[2.5rem] relative z-10 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 id="tituloDetalhe" class="text-2xl font-black italic text-blue-600 uppercase">Ativos</h2>
                <button onclick="toggleModal('modalDetalhes')" class="text-slate-400 font-bold uppercase text-xs">Fechar X</button>
            </div>
            <div id="corpoDetalhes" class="space-y-3 max-h-96 overflow-y-auto pr-2"></div>
        </div>
    </div>
// === Modal para adicionar novo ativo ===
<div id="modalAtivo" class="pointer-events-none opacity-0">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="toggleModal('modalAtivo')"></div>
        <div class="bg-white w-full max-w-sm p-8 rounded-[2.5rem] relative z-10 shadow-2xl border-t-8 border-blue-600">
            <h2 class="text-xl font-black mb-6 uppercase text-center text-blue-600 italic">Novo Ativo</h2>
            <form id="formInvestimento" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">1. Escolha a Categoria</label>
                    <select id="categoria_select" class="w-full bg-slate-50 border-2 p-3 rounded-xl font-bold uppercase outline-none focus:border-blue-600" required>
                        <option value="" disabled selected>Selecionar...</option>
                    </select>
                </div>

                <div class="space-y-1 relative">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">2. Ticker do Ativo</label>
                    <input type="text" id="ticker" placeholder="EX: AAPL OU PETR4" class="w-full bg-slate-50 border-2 p-3 rounded-xl font-black uppercase outline-none focus:border-blue-600" autocomplete="off" required>
                    
                    <div id="suggestions" class="suggestions-box"></div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <input type="number" step="any" id="quantidade_input" placeholder="QTD" class="w-full bg-slate-50 border-2 p-3 rounded-xl font-black outline-none" required>
                    </div>
                    <div class="space-y-1">
                        <input type="text" id="valor_unit_input" placeholder="PREÇO" class="w-full bg-slate-50 border-2 p-3 rounded-xl font-black text-blue-600 outline-none" required>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-lg hover:bg-blue-700 transition-all">Salvar Ativo</button>
                
                <p class="text-[9px] text-center text-slate-400 font-bold uppercase mt-4 leading-tight">
                    * Ativos internacionais convertem para R$ automaticamente se a API retornar.
                </p>
            </form>
        </div>
    </div>// === Fim do Modal ===
    <script type="module" src="script.js"></script>
</body>
</html>
